<div class="card-detalle">

<h3>Información de la venta</h3>

<div id="detalleVenta"></div>

<hr>

<label>Estado de la venta:</label><br>

<select id="estado">
<option value="pendiente">Pendiente</option>
<option value="abono">Abono</option>
<option value="cancelado">Cancelado</option>
</select>

<br><br>

<button onclick="actualizarEstado()">Guardar cambios</button>
<!--1) CRUD-DELETE: luego, funcion para activarlo en AJAX-->
<button id="btnEliminar" onclick="eliminarVenta()">
Eliminar venta
</button>


</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
let idVenta = new URLSearchParams(window.location.search).get("id");

$(document).ready(function(){
    cargarDetalle();
});

function cargarDetalle(){

$.ajax({
    url:"obtener_detalle_venta.php",
    type:"GET",
    data:{id:idVenta},

    dataType: "json",

    success:function(venta){

        $("#detalleVenta").html(`
        Cliente: ${venta.cliente}<br>
        Fecha: ${venta.fecha}<br>
        Total: $ ${parseInt(venta.total).toLocaleString("es-CO")}
        `);

        $("#estado").val(venta.estado);
    }

});

}

function actualizarEstado(){

let estado = $("#estado").val();

$.ajax({
    url:"actualizar_estado.php",
    type:"POST",

    data:{
        id_venta:idVenta,
        estado:estado
    },

    success:function(){
        alert("Estado actualizado");
        window.location.href="ventas_inicio.html";
    }

});

}
 //2) CRUD-DELETE: esta funcion se activa cuando presiono el boton ELIMINAR VENTA
function eliminarVenta(){

Swal.fire({
title: "¿Eliminar venta?",
text: "Esta acción no se puede deshacer",
icon: "warning",
showCancelButton: true,
confirmButtonColor: "#d33",
cancelButtonColor: "#3085d6",
confirmButtonText: "Sí, eliminar",
cancelButtonText: "Cancelar"
}).then((result) => {

if (result.isConfirmed) {

    $.ajax({
        url:"eliminar_venta.php",
        type:"POST",

        data:{
            id_venta:idVenta
        },

        success:function(){

            Swal.fire(
                "Eliminado",
                "La venta fue eliminada correctamente",
                "success"
            ).then(() => {
                window.location.href="ventas_inicio.html";
            });

        }

    });

}

});

}

</script>

</body>
