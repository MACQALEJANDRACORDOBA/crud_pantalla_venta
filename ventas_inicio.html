<!--¿Qué hace todo el script? Llama a obtener_ventas.php -> Recibe los datos -> Crea tarjetas -> Las muestra en tu pantalla-->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function () {
    cargarVentas();
});

function cargarVentas() {
    $.ajax({
        url: "obtener_ventas.php",
        type: "GET",
    
        success: function (response) {

    let ventas = JSON.parse(response);
   

    let html = "";
            ventas.forEach(function (venta) {
                //estos let es para poder mostrar cubetas + huevos en el resumen de ventas; ya no: 35 huevos; si no:1 cubeta + 5 huevos (35huevos)
                let total = parseInt(venta.cantidad_total);

                let cubetas = Math.floor(total / 30);
                let unidades = total % 30;
                
                //y este let + condicion es para que cuando no haya unidades extra no aparezca “+ 0 huevos”.
                let textoCantidad = "";

                    if(unidades === 0){
                        textoCantidad = cubetas + " cubetas (" + total + ")";
                    } else {
                        textoCantidad = cubetas + " cubetas + " + unidades + " huevos (" + total + ")";
                    }

//template string “Estoy construyendo HTML dinámico” // 1) onclick-> este cambio lo hice para el UPDATE DEL CRUD: hice que la tarjeta sea clickeable.
           html += `
    <div class="card-venta" onclick="abrirVenta(${venta.id_venta})">
        <div class="venta-header">
    <strong>${venta.cliente}</strong>
   <span class="estado ${venta.estado}">
    ${venta.estado === "abono" ? "Abonó" : 
      venta.estado === "pendiente" ? "Pendiente" : 
      "Cancelado"}
</span>
    </div>

        <div class="venta-body">
            Fecha: ${venta.fecha} <br>
            Tamaño: ${venta.tamano} <br>
            Cantidad: ${textoCantidad} <br>
            Nota: ${venta.nota ? venta.nota : "Sin nota"}
        </div>

        <div class="venta-footer">
          $ ${parseInt(venta.total).toLocaleString("es-CO")} 
        </div>
    </div>
            `;
            });

            $("#listaVentas").html(html);
        }
    });
}

//2)UPDATE DEL CRUD:Creo la función que abre la venta; Cuando haces click -> venta id 5 abre -> detalle_venta.html?id=5 
// tuve que crear otra pantalla: detalle_venta.html
function abrirVenta(id){
    window.location.href = "detalle_venta.html?id=" + id;
}

</script>
